<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wesołych Świąt Wielkanocnych</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #fdf6ec;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
 #messages {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  font-family: 'Playfair Display', Georgia, serif;
 }
  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-size: clamp(2rem, 5vw, 3.6rem);
    color: #5a3e28;
    text-align: center;
    line-height: 1.3;
    z-index: 10;
    position: relative;
    max-width: 480px;
    padding: 20px;
  }

  h1 span { color: #4a7c59; }

img {
  position: absolute;
  width: 160px;
  height: 160px;
  object-fit: contain;
  filter: drop-shadow(2px 4px 8px rgba(0,0,0,.12));
  animation: float 1.2s steps(2, jump-none) infinite;
}

@keyframes float {
  0%, 100% {
    transform: translateY(0) rotate(var(--r));
  }
  50% {
    transform: translateY(-10px) rotate(calc(var(--r) * -1));
  }
}

  img:nth-child(1) { top: 6%;    left: 5%;    --r: -8deg;  animation-delay: 0s;   }
  img:nth-child(2) { top: 5%;    right: 6%;   --r:  6deg;  animation-delay: .6s;  }
  img:nth-child(3) { bottom: 8%; left: 8%;    --r: -5deg;  animation-delay: 1.2s; }
  img:nth-child(4) { bottom: 6%; right: 5%;   --r:  9deg;  animation-delay: 1.8s; }
  img:nth-child(5) { top: 42%;   left: 2%;    --r:-12deg;  animation-delay: .9s;  }
</style>
</head>
<body>

<img src="jajko.png"     alt="Jajko wielkanocne">
<img src="zajaczek.png"  alt="Zajączek">
<img src="kwiaty.png"    alt="Kwiaty">
<img src="koszyczek.png" alt="Koszyczek wielkanocny">
<img src="baranek.png"   alt="Baranek">
<div id="messages">
<h1>Święta Wielkanocne</h1>
<p>Wielkanoc, znana również jako Pascha, jest jednym z najważniejszych świąt chrześcijańskich, obchodzonym na pamiątkę zmartwychwstania Jezusa Chrystusa. Święta te są obchodzone w różnych krajach na całym świecie, a tradycje związane z Wielkanocą różnią się w zależności od regionu.
    </p>
</div>
</body>
</html>
